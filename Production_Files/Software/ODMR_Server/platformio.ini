; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3]
platform = espressif32@6.9.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.partitions = custom_partition_esp32s3.csv
board_upload.flash_size = 4MB
build_unflags = -std=gnu++11
build_flags = -DESP32S3 
lib_deps = 
	bblanchon/ArduinoJson@^7.3.1
	adafruit/Adafruit TSL2591 Library@^1.4.5
	adafruit/Adafruit NeoPixel@^1.12.5


[env:seeed_xiao_esp32c3]
platform = espressif32@6.9.0
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.partitions = custom_partition_esp32c3.csv
board_upload.flash_size = 4MB
build_unflags = -std=gnu++11
build_flags = -DESP32C3 
lib_deps = 
	bblanchon/ArduinoJson@^7.3.1
	adafruit/Adafruit TSL2591 Library@^1.4.5
	adafruit/Adafruit NeoPixel@^1.12.5
	; rf synthesizer library, possibly self-written, local folder
	ADF4351 = symlink://${PROJECT_DIR}/lib/ADF4351
